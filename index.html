<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="bg-pink-100 h-screen flex flex-col items-center justify-center overflow-hidden font-sans">

    <div id="question-section" class="text-center p-6">
        <h1 class="text-4xl md:text-6xl font-bold text-red-600 mb-8 floating">Will you be my Valentine? ❤️</h1>
        
        <div class="flex gap-4 justify-center">
            <button id="yesBtn" class="bg-red-500 hover:bg-red-600 text-white px-8 py-3 rounded-full text-xl font-semibold transition-all transform hover:scale-110">
                Yes!
            </button>
            <button id="noBtn" class="bg-gray-400 text-white px-8 py-3 rounded-full text-xl font-semibold">
                No
            </button>
        </div>
    </div>

    <div id="success-section" class="hidden text-center p-6">
        <h1 class="text-4xl font-bold text-red-600 mb-6">Yay! See you on the 14th! 🥰</h1>
        
        <div class="grid grid-cols-2 gap-4 max-w-md mx-auto">
            <img src="your-photo-1.jpg" alt="Us" class="rounded-lg shadow-lg border-4 border-white transform -rotate-3 hover:rotate-0 transition">
            <img src="your-photo-2.jpg" alt="Us" class="rounded-lg shadow-lg border-4 border-white transform rotate-3 hover:rotate-0 transition">
        </div>
        
        <div class="mt-8 text-red-400 animate-bounce text-2xl">❤️❤️❤️</div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionSection = document.getElementById('question-section');
        const successSection = document.getElementById('success-section');

        // Logic for the "No" button to run away (optional but funny)
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });

        // Show photos on Yes
        yesBtn.addEventListener('click', () => {
            questionSection.classList.add('hidden');
            successSection.classList.remove('hidden');
            
            // Optional: Trigger confetti or music here
        });
    </script>
</body>
</html>

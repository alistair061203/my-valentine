<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine? ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>

<body class="h-screen flex flex-col items-center justify-center overflow-hidden font-sans"
      style="background: url('Background.jpg') no-repeat center center/cover; position: relative;">

    <div class="absolute inset-0 bg-black/30 z-0"></div>

    <div id="question-section" class="text-center p-6 z-10 relative">
        <h1 class="text-4xl md:text-6xl font-bold text-white mb-8 floating drop-shadow-lg">
            Will you be my Valentine Date Pangga?
        </h1>
        
        <div class="flex gap-4 justify-center">
            <a href="success.html" class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-full text-xl font-bold transition-all transform hover:scale-110 shadow-lg flex items-center justify-center no-underline border-2 border-white">
                Yes!
            </a>
            
            <button id="noBtn" class="bg-gray-500 text-white px-8 py-3 rounded-full text-xl font-bold shadow-md border-2 border-white cursor-pointer">
                No
            </button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');

        // Logic for the "No" button to run away
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });
        
        // Mobile support (tap to run away)
        noBtn.addEventListener('click', (e) => {
            e.preventDefault(); // Stop it from clicking
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });
    </script>
</body>
</html>

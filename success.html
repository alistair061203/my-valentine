<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🥰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Floating animation for the title */
        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        /* 3D Carousel Animation */
        @keyframes spin-y {
            from {
                transform: rotateY(0deg);
            }

            to {
                transform: rotateY(360deg);
            }
        }

        .animate-spin-3d {
            animation: spin-y 20s linear infinite;
        }

        /* Responsive 3D depth */
        .perspective-container {
            perspective: 1000px;
        }
    </style>
</head>

<body class="bg-[#fff3ed] h-screen flex flex-col items-center justify-center overflow-hidden font-sans">

    <div class="text-center w-full flex flex-col items-center">
        <h1 class="text-4xl font-bold text-red-600 mb-4 z-10">Yay! See you on the 14th! 🥰</h1>

        <div class="scene">
            <div class="a3d" style="--n: 6">
                <img class="card" style="--i: 0" src="your-photo-1.jpg" alt="Us 1">
                <img class="card" style="--i: 1" src="your-photo-2.jpg" alt="Us 2">
                <img class="card" style="--i: 2" src="your-photo-3.jpg" alt="Us 3">
                <img class="card" style="--i: 3" src="your-photo-4.jpg" alt="Us 4">
                <img class="card" style="--i: 4" src="your-photo-5.jpg" alt="Us 5">
                <img class="card" style="--i: 5" src="your-photo-6.jpg" alt="Us 6">
            </div>
        </div>

        <div class="mt-8 text-red-400 animate-bounce text-2xl">❤️❤️❤️</div>
    </div>

</body>

</html>

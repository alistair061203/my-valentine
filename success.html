<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🥰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Exact CSS from your snippet */
        html, body { display: grid; height: 100%; margin: 0; }
        body { background: #fff3ed; overflow: hidden; }

        .scene, .a3d { display: grid; }

        .scene {
            /* prevent scrollbars */
            overflow: hidden;
            /* for 3D look; smaller = more extreme effect */
            perspective: 35em;
            mask: linear-gradient(90deg, #0000, red 20% 80%, #0000);
            height: 100vh;
            width: 100vw;
        }

        .a3d {
            place-self: center; /* middle align */
            transform-style: preserve-3d;
            animation: ry 30s linear infinite;
        }

        @keyframes ry { to { transform: rotateY(1turn); } }

        .card {
            /* base card width */
            --w: 15em;
            /* compute base angle corresponding to a card (360deg / n) */
            --ba: calc(360deg / var(--n));
            grid-area: 1/ 1; /* STACK THEM IN THE CENTER FIRST */
            width: var(--w);
            aspect-ratio: 7 / 10;
            object-fit: cover;
            border-radius: 1.5em;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backface-visibility: hidden;
            
            /* Your exact transform chain */
            transform: 
                rotateY(calc(var(--i) * var(--ba)))
                /* The tan math ensures they sit side-by-side */
                translateZ(calc(0.5 * var(--w) / tan(0.5 * var(--ba))));
        }

        .message {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            color: #e11d48;
            font-weight: bold;
            font-size: 2.5rem;
            z-index: 50;
        }
    </style>
</head>
<body>

    <h1 class="message">Yay! See you on the 14th! 🥰</h1>

    <div class="scene">
        <div class="a3d" style="--n: 5">
            <img class="card" style="--i: 0" src="your-photo-1.jpg" alt="Us 1">
            <img class="card" style="--i: 1" src="your-photo-2.jpg" alt="Us 2">
            <img class="card" style="--i: 2" src="your-photo-3.jpg" alt="Us 3">
            <img class="card" style="--i: 4" src="your-photo-4.jpg" alt="Us 4">
            <img class="card" style="--i: 4" src="your-photo-5.jpg" alt="Us 5">
        </div>
    </div>

    <audio autoplay loop>
        <source src="Music.mp3" type="audio/mpeg">
    </audio>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🥰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff3ed;
            overflow: hidden;
        }

        /* 1. The Container */
        .scene {
            position: relative;
            width: 100%;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* This gives the 3D depth */
            perspective: 1200px; 
        }

        /* 2. The Rotating Ring */
        .carousel {
            position: relative;
            width: 200px;
            height: 280px;
            transform-style: preserve-3d;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        /* 3. The Individual Cards */
        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            border: 5px solid white;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            /* Prevents seeing the back of the photo */
            backface-visibility: hidden; 
            
            /* Logic for 5 images: 360 / 5 = 72 degrees each */
            /* transform: rotateY(angle) translateZ(radius) */
        }

        .card:nth-child(1) { transform: rotateY(0deg) translateZ(250px); }
        .card:nth-child(2) { transform: rotateY(72deg) translateZ(250px); }
        .card:nth-child(3) { transform: rotateY(144deg) translateZ(250px); }
        .card:nth-child(4) { transform: rotateY(216deg) translateZ(250px); }
        .card:nth-child(5) { transform: rotateY(288deg) translateZ(250px); }

        /* Pause on touch/hover */
        .scene:hover .carousel {
            animation-play-state: paused;
        }
    </style>
</head>
<body>

    <div class="text-center z-10 mb-12">
        <h1 class="text-4xl font-bold text-red-600 drop-shadow-sm">Yay! See you on the 14th! 🥰</h1>
    </div>

    <div class="scene">
        <div class="carousel">
            <img class="card" src="your-photo-1.jpg" alt="Us 1">
            <img class="card" src="your-photo-2.jpg" alt="Us 2">
            <img class="card" src="your-photo-3.jpg" alt="Us 3">
            <img class="card" src="your-photo-4.jpg" alt="Us 4">
            <img class="card" src="your-photo-5.jpg" alt="Us 5">
        </div>
    </div>

    <audio autoplay loop>
        <source src="Music.mp3" type="audio/mpeg">
    </audio>

    <div class="mt-12 text-red-400 animate-bounce text-3xl">❤️❤️❤️</div>

</body>
</html>

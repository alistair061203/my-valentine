<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🥰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Global Reset */
        html, body {
            display: grid;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            background: #fff3ed;
        }

        /* 3D Scene */
        .scene {
            display: grid;
            place-items: center;
            overflow: hidden;
            perspective: 60em;
            mask: linear-gradient(90deg, #0000, red 10% 90%, #0000);
            height: 100vh;
            width: 100vw;
        }

        /* The Spinner */
        .a3d {
            display: grid;
            place-self: center;
            transform-style: preserve-3d;
            /* CHANGED SPEED HERE: 140s is much slower than 60s */
            animation: ry 140s linear infinite; 
        }

        @keyframes ry {
            to { transform: rotateY(1turn); }
        }

        /* The Card */
        .card {
            --w: 10em; 
            --ba: calc(1turn / var(--n));
            grid-area: 1 / 1;
            width: var(--w);
            aspect-ratio: 7 / 10;
            object-fit: cover;
            border-radius: 1em;
            
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            backface-visibility: hidden;

            transform:
                rotateY(calc(var(--i) * var(--ba)))
                translateZ(calc(-1 * (0.5 * var(--w) + 0.5em) / tan(0.5 * var(--ba))));
        }

        .message {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            color: #e11d48;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 2.5rem;
            z-index: 100;
            text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        }

        /* --- MOBILE FIX --- */
        @media (max-width: 768px) {
            .card {
                /* Smaller cards to reduce ring size */
                --w: 4em; 
            }
            
            .scene {
                /* Zoom in to see the details */
                transform: scale(3); 
            }

            .message {
                font-size: 1.2rem;
                top: 12%;
            }
        }
    </style>
</head>

<body onclick="document.getElementById('bg-music').play()">

    <h1 class="message font-sans">Yeey! Lovee youu!</h1>

    <div class="scene">
        <div class="a3d" id="carousel"></div>
    </div>

    <audio id="bg-music" autoplay loop>
        <source src="Music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const TOTAL_IMAGES = 104; 
        const FOLDER_NAME = 'Valentines'; 
        const CAROUSEL = document.getElementById('carousel');

        CAROUSEL.style.setProperty('--n', TOTAL_IMAGES);

        for (let i = 1; i <= TOTAL_IMAGES; i++) {
            const img = document.createElement('img');
            img.className = 'card';
            img.style.setProperty('--i', i - 1);
            img.src = `${FOLDER_NAME}/${i}.jpg`;
            
            img.onerror = function() {
                this.src = `${FOLDER_NAME}/${i}.JPG`; 
            };

            img.alt = `Memory ${i}`;
            CAROUSEL.appendChild(img);
        }
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🥰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Global Reset */
        html, body {
            display: grid;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            background: #fff3ed;
        }

        /* 3D Scene */
        .scene {
            display: grid;
            place-items: center;
            overflow: hidden;
            perspective: 60em; /* Deep perspective for the large ring */
            mask: linear-gradient(90deg, #0000, red 10% 90%, #0000); /* Fade edges */
            height: 100vh;
            width: 100vw;
        }

        /* The Spinner */
        .a3d {
            display: grid;
            place-self: center;
            transform-style: preserve-3d;
            animation: ry 60s linear infinite; /* Slower rotation for 104 images */
        }

        @keyframes ry {
            to { transform: rotateY(1turn); }
        }

        /* The Card */
        .card {
            /* We make the cards smaller (10em) so the ring doesn't get 
               too massive (miles wide) with 104 items */
            --w: 10em; 
            
            --ba: calc(1turn / var(--n));
            grid-area: 1 / 1;
            width: var(--w);
            aspect-ratio: 7 / 10;
            object-fit: cover;
            border-radius: 1em;
            
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            backface-visibility: hidden;

            /* The Math */
            transform:
                rotateY(calc(var(--i) * var(--ba)))
                translateZ(calc(-1 * (0.5 * var(--w) + 0.5em) / tan(0.5 * var(--ba))));
        }

        .message {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            color: #e11d48;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 2.5rem;
            z-index: 100;
            text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        }
    </style>
</head>

<body>

    <h1 class="message font-sans">Yeey! Lovee youu!</h1>

    <div class="scene">
        <div class="a3d" id="carousel"></div>
    </div>

    <audio id="bg-music" loop>
        <source src="Music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- CONFIGURATION ---
        const TOTAL_IMAGES = 104; 
        const FOLDER_NAME = 'Valentines'; 
        const CAROUSEL = document.getElementById('carousel');

        // 1. Tell CSS how many images there are
        CAROUSEL.style.setProperty('--n', TOTAL_IMAGES);

        // 2. Generate the <img> tags
        for (let i = 1; i <= TOTAL_IMAGES; i++) {
            const img = document.createElement('img');
            img.className = 'card';
            
            // CSS Index (starts at 0)
            img.style.setProperty('--i', i - 1);
            
            // Filename: Valentines/1.jpg, Valentines/2.jpg ...
            // IMPORTANT: This assumes you ran the Python script and all files are now .jpg
            img.src = `${FOLDER_NAME}/${i}.jpg`;
            
            // Fail-safe: If .jpg doesn't exist, try .JPG (just in case)
            img.onerror = function() {
                this.src = `${FOLDER_NAME}/${i}.JPG`;
            };

            img.alt = `Memory ${i}`;
            CAROUSEL.appendChild(img);
        }

        // 3. Audio Fail-Safe
        const audio = document.getElementById('bg-music');
        document.body.addEventListener('click', () => {
            audio.play().catch(e => console.log("Audio waiting for interaction"));
        }, { once: true });
    </script>

</body>

</html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Based on your reference snippet */
        html,
        body {
            display: grid;
            height: 100%;
            margin: 0;
        }

        body {
            background: #fff3ed;
            overflow: hidden;
        }

        .scene,
        .a3d {
            display: grid;
        }

        .scene {
            overflow: hidden;
            perspective: 35em;
            margin-top: auto;
            mask: linear-gradient(90deg, #0000, red 20% 80%, #0000);
            height: 100vh;
            width: 100vw;
        }

        .a3d {
            place-self: center;
            transform-style: preserve-3d;
            animation: ry 30s linear infinite;
            /* Slow, continuous rotation */
        }

        @keyframes ry {
            to {
                transform: rotateY(1turn);
            }
        }

        .card {
            --w: 18em;
            /* Card width */
            --ba: calc(1turn / var(--n));
            /* Angle per card */
            grid-area: 1/ 1;
            /* VERY IMPORTANT: Stacks them in one spot first */
            width: var(--w);
            aspect-ratio: 7 / 10;
            object-fit: cover;
            border-radius: 1.5em;
            backface-visibility: hidden;

            /* The specific transform chain from your jellyfish snippet */
            transform:
                rotateY(calc(var(--i) * var(--ba)))
                /* Negative translateZ pushes them away into a wider ring */
                translateZ(calc(-1 * (0.5 * var(--w) + 0.5em) / tan(0.5 * var(--ba))));
        }

        .message {
            position: absolute;
            top: 15%;
            width: 100%;
            text-align: center;
            color: pink;
            font-weight: bold;
            font-size: 2.5rem;
            z-index: 100;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            letter-spacing: 0.05em;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 10px;
            padding: 0 2rem;
            line-height: 1.2;
        }
    </style>
</head>

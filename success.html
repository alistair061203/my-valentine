<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🥰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 3D Scene Setup */
        .scene {
            display: grid;
            overflow: hidden;
            perspective: 35em;
            /* Lateral fade effect to smooth the edges */
            mask: linear-gradient(90deg, #0000, red 20% 80%, #0000);
            width: 100%;
            height: 600px;
        }

        .a3d {
            place-self: center;
            transform-style: preserve-3d;
            /* Spin + Slide from Right to Left */
            animation: move-and-rotate 20s linear infinite;
        }

        @keyframes move-and-rotate {
            0% { transform: translateX(100vw) rotateY(0turn); }
            100% { transform: translateX(-100vw) rotateY(1turn); }
        }

        .card {
            --w: 12em; 
            --ba: 1turn / var(--n);
            grid-area: 1 / 1;
            width: var(--w);
            aspect-ratio: 7 / 10;
            object-fit: cover;
            border-radius: 1.5em;
            backface-visibility: hidden;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            /* The specific 3D ring math */
            transform: 
                rotateY(calc(var(--i) * var(--ba))) 
                translateZ(calc(-1 * (.5 * var(--w) + 2em) / tan(.5 * var(--ba))));
        }

        @media (prefers-reduced-motion: reduce) {
            .a3d { animation-duration: 80s; }
        }
    </style>
</head>
<body class="bg-[#fff3ed] h-screen flex flex-col items-center justify-center overflow-hidden font-sans">

    <div class="text-center w-full flex flex-col items-center">
        <h1 class="text-4xl font-bold text-red-600 mb-4 z-10">Yay! See you on the 14th! 🥰</h1>
        
        <div class="scene">
            <div class="a3d" style="--n: 6">
                <img class="card" style="--i: 0" src="your-photo-1.jpg" alt="Us 1">
                <img class="card" style="--i: 1" src="your-photo-2.jpg" alt="Us 2">
                <img class="card" style="--i: 2" src="your-photo-3.jpg" alt="Us 3">
                <img class="card" style="--i: 3" src="your-photo-4.jpg" alt="Us 4">
                <img class="card" style="--i: 4" src="your-photo-5.jpg" alt="Us 5">
                <img class="card" style="--i: 5" src="your-photo-6.jpg" alt="Us 6">
            </div>
        </div>

        <div class="mt-8 text-red-400 animate-bounce text-2xl">❤️❤️❤️</div>
    </div>

</body>
</html>

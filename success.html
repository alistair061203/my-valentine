<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🥰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Based on your reference snippet */
        html,
        body {
            display: grid;
            height: 100%;
            margin: 0;
        }

        body {
            background: #fff3ed;
            overflow: hidden;
        }

        .scene,
        .a3d {
            display: grid;
        }

        .scene {
            overflow: hidden;
            perspective: 35em;
            margin-top: auto;
            mask: linear-gradient(90deg, #0000, red 20% 80%, #0000);
            height: 100vh;
            width: 100vw;
        }

        .a3d {
            place-self: center;
            transform-style: preserve-3d;
            animation: ry 30s linear infinite;
            /* Slow, continuous rotation */
        }

        @keyframes ry {
            to {
                transform: rotateY(1turn);
            }
        }

        .card {
            --w: 18em;
            /* Card width */
            --ba: calc(1turn / var(--n));
            /* Angle per card */
            grid-area: 1/ 1;
            /* VERY IMPORTANT: Stacks them in one spot first */
            width: var(--w);
            aspect-ratio: 7 / 10;
            object-fit: cover;
            border-radius: 1.5em;
            backface-visibility: hidden;

            /* The specific transform chain from your jellyfish snippet */
            transform:
                rotateY(calc(var(--i) * var(--ba)))
                /* Negative translateZ pushes them away into a wider ring */
                translateZ(calc(-1 * (0.5 * var(--w) + 0.5em) / tan(0.5 * var(--ba))));
        }

        .message {
            position: absolute;
            top: 15%;
            width: 100%;
            text-align: center;
            color: pink;
            font-weight: bold;
            font-size: 2.5rem;
            z-index: 100;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            letter-spacing: 0.05em;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 10px;
            padding: 0 2rem;
            line-height: 1.2;
        }
    </style>
</head>

<body>
    <audio autoplay loop>
        <source src="Music.mp3" type="audio/mpeg">
    </audio>

    <h1 class="message font-sans">Yeey! Lovee youu!</h1>

    <div class="scene">
        <div class="a3d" style="--n: 13">
            <div class="scene">
                <div class="a3d" style="--n: 13">
                    <img class="card" style="--i: 0" src="Valentines/1.jpg" alt="Us 1">
                    <img class="card" style="--i: 1" src="Valentines/2.JPG" alt="Us 2">
                    <img class="card" style="--i: 2" src="Valentines/3.JPG" alt="Us 3">
                    <img class="card" style="--i: 3" src="Valentines/4.JPG" alt="Us 4">
                    <img class="card" style="--i: 4" src="Valentines/5.JPG" alt="Us 5">
                    <img class="card" style="--i: 5" src="Valentines/6.JPG" alt="Us 6">
                    <img class="card" style="--i: 6" src="Valentines/7.JPG" alt="Us 7">
                    <img class="card" style="--i: 7" src="Valentines/8.JPEG" alt="Us 8">
                    <img class="card" style="--i: 8" src="Valentines/9.JPG" alt="Us 9">
                    <img class="card" style="--i: 9" src="Valentines/10.JPG" alt="Us 10">
                    <img class="card" style="--i: 10" src="Valentines/11.JPEG" alt="Us 11">
                    <img class="card" style="--i: 11" src="Valentines/12.JPEG" alt="Us 12">
                    <img class="card" style="--i: 12" src="Valentines/13.JPG" alt="Us 13">
                </div>
            </div>

        </div>
</body>

</html>

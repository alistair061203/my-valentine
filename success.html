<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🥰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff3ed;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* 3D Scene Setup */
        .scene {
            display: grid;
            perspective: 60em;
            /* Depth of the 3D effect */
            width: 100%;
            height: 400px;
        }

        .a3d {
            place-self: center;
            transform-style: preserve-3d;
            animation: rotate-carousel 20s linear infinite;
        }

        @keyframes rotate-carousel {
            from {
                transform: rotateY(0turn);
            }

            to {
                transform: rotateY(1turn);
            }
        }

        .card {
            /* Radius Calculation for 5 images */
            --w: 12em;
            --n: 5;
            --ba: 1turn / var(--n);
            grid-area: 1 / 1;
            width: var(--w);
            aspect-ratio: 7 / 10;
            object-fit: cover;
            border-radius: 1.5em;
            border: 5px solid white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backface-visibility: hidden;

            /* Logic to place each card in the ring */
            transform:
                rotateY(calc(var(--i) * var(--ba))) translateZ(15em);
            /* Adjust this to make the circle bigger/smaller */
        }

        /* Hover effect to pause rotation */
        .scene:hover .a3d {
            animation-play-state: paused;
        }
    </style>
</head>

<body>

    <div class="flex flex-col items-center justify-center text-center w-full">
        <h1 class="text-4xl font-bold text-red-600 mb-16 z-10">Yay! See you on the 14th! 🥰</h1>

        <div class="scene">
            <div class="a3d" style="--n: 5">
                <img class="card" style="--i: 0" src="your-photo-1.jpg" alt="Photo 1">
                <img class="card" style="--i: 1" src="your-photo-2.jpg" alt="Photo 2">
                <img class="card" style="--i: 2" src="your-photo-3.jpg" alt="Photo 3">
                <img class="card" style="--i: 3" src="your-photo-4.jpg" alt="Photo 4">
                <img class="card" style="--i: 4" src="your-photo-5.jpg" alt="Photo 5">
            </div>
        </div>
        <audio id="myAudio" loop>
            <source src="Music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // Start audio on first click anywhere to bypass browser blocks
        window.addEventListener('load', () => {
            const audio = document.getElementById('myAudio');
            document.body.addEventListener('click', () => {
                audio.play();
            }, { once: true });
        });
    </script>

</body>

</html>

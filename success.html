<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🥰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Based on your provided snippet logic */
        html, body { display: grid; height: 100%; margin: 0; }
        
        body { 
            background: #fff3ed; 
            overflow: hidden;
            font-family: sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .scene, .a3d { display: grid; }

        .scene {
            overflow: hidden;
            /* 3D depth; smaller = more extreme effect */
            perspective: 35em;
            /* Lateral fade effect from your snippet */
            mask: linear-gradient(90deg, #0000, red 20% 80%, #0000);
            width: 100vw;
            height: 500px;
        }

        .a3d {
            place-self: center;
            transform-style: preserve-3d;
            /* Rotation speed */
            animation: ry 20s linear infinite;
        }

        @keyframes ry { 
            to { transform: rotateY(1turn); } 
        }

        .card {
            /* Base card width */
            --w: 15em;
            /* Base angle per card (360deg / total) */
            --ba: calc(1turn / var(--n));
            grid-area: 1 / 1;
            width: var(--w);
            aspect-ratio: 7 / 10;
            object-fit: cover;
            border-radius: 1.5em;
            backface-visibility: hidden;
            
            /* The specific transform chain from your snippet */
            /* This calculates the exact radius needed for cards to sit edge-to-edge */
            transform: 
                rotateY(calc(var(--i) * var(--ba)))
                translateZ(calc(.5 * var(--w) / tan(.5 * var(--ba))));
        }

        @media (prefers-reduced-motion: reduce) {
            .a3d { animation-duration: 80s; }
        }

        .message {
            text-align: center;
            color: #e11d48;
            font-weight: bold;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="message">Yay! See you on the 14th! 🥰</h1>

        <div class="scene">
            <div class="a3d" style="--n: 5">
                <img class="card" style="--i: 0" src="your-photo-1.jpg" alt="Us 1">
                <img class="card" style="--i: 1" src="your-photo-2.jpg" alt="Us 2">
                <img class="card" style="--i: 2" src="your-photo-3.jpg" alt="Us 3">
                <img class="card" style="--i: 3" src="your-photo-4.jpg" alt="Us 4">
                <img class="card" style="--i: 4" src="your-photo-5.jpg" alt="Us 5">
            </div>
        </div>

        <audio autoplay loop>
            <source src="Music.mp3" type="audio/mpeg">
        </audio>
    </div>

</body>
</html>

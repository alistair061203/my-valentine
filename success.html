<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🥰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Based on your reference snippet */
        html,
        body {
            display: grid;
            height: 100%;
            margin: 0;
        }

        body {
            background: #fff3ed;
            overflow: hidden;
        }

        .scene,
        .a3d {
            display: grid;
        }

        .scene {
            overflow: hidden;
            perspective: 35em;
            /* Extreme 3D depth */
            /* This creates the lateral fade from your reference image */
            mask: linear-gradient(90deg, #0000, red 20% 80%, #0000);
            height: 100vh;
            width: 100vw;
        }

        .a3d {
            place-self: center;
            transform-style: preserve-3d;
            animation: ry 30s linear infinite;
            /* Slow, continuous rotation */
        }

        @keyframes ry {
            to {
                transform: rotateY(1turn);
            }
        }

        .card {
            --w: 18em;
            /* Card width */
            --ba: calc(1turn / var(--n));
            /* Angle per card */
            grid-area: 1/ 1;
            /* VERY IMPORTANT: Stacks them in one spot first */
            width: var(--w);
            aspect-ratio: 7 / 10;
            object-fit: cover;
            border-radius: 1.5em;
            backface-visibility: hidden;

            /* The specific transform chain from your jellyfish snippet */
            transform:
                rotateY(calc(var(--i) * var(--ba)))
                /* Negative translateZ pushes them away into a wider ring */
                translateZ(calc(-1 * (0.5 * var(--w) + 0.5em) / tan(0.5 * var(--ba))));
        }

        .message {
            position: absolute;
            top: 15%;
            width: 100%;
            text-align: center;
            color: #e11d48;
            font-weight: bold;
            font-size: 2.5rem;
            z-index: 100;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            letter-spacing: 0.05em;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin: 0;
            padding: 0 2rem;
            line-height: 1.2;
        }
    </style>
</head>

<body>

    <h1 class="message font-sans">Yeeeeeey! Lovee youuu! 🥰</h1>

    <div class="scene">
        <div class="a3d" style="--n: 5">
            <img class="card" style="--i: 0" src="your-photo-1.jpg" alt="Us 1">
            <img class="card" style="--i: 1" src="your-photo-2.jpg" alt="Us 2">
            <img class="card" style="--i: 2" src="your-photo-3.jpg" alt="Us 3">
            <img class="card" style="--i: 3" src="your-photo-4.jpg" alt="Us 4">
            <img class="card" style="--i: 4" src="your-photo-5.jpg" alt="Us 5">
        </div>
    </div>

    <audio autoplay loop>
        <source src="Music.mp3" type="audio/mpeg">
    </audio>

</body>

</html>

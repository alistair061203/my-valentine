<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🥰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Based on your reference snippet */
        html,
        body {
            background: #fff3ed;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .scene,
        .a3d {
            display: grid;
        }

        .scene {
            overflow: hidden;
            perspective: 35em;
            /* Extreme 3D depth */
            /* This creates the lateral fade from your reference image */
            mask: linear-gradient(90deg, #0000, red 20% 80%, #0000);
            height: 100vh;
            width: 100vw;
        }

        .a3d {
            place-self: center;
            transform-style: preserve-3d;
            animation: ry 30s linear infinite;
            /* Slow, continuous rotation */
        }

        @keyframes ry {
            to {
                transform: rotateY(1turn);
            }
        }

        .card {
            --w: 18em;
            /* Card width */
            --ba: calc(1turn / var(--n));
            /* Angle per card */
            grid-area: 1/ 1;
            /* VERY IMPORTANT: Stacks them in one spot first */
            width: var(--w);
            aspect-ratio: 7 / 10;
            object-fit: cover;
            border-radius: 1.5em;
            backface-visibility: hidden;

            /* The specific transform chain from your jellyfish snippet */
            transform:
                rotateY(calc(var(--i) * var(--ba)))
                /* Negative translateZ pushes them away into a wider ring */
                translateZ(calc(-1 * (0.5 * var(--w) + 0.5em) / tan(0.5 * var(--ba))));
        }
    </style>
</head>

<body>

    <div class="flex flex-col items-center justify-center flex-1 w-full px-4">

        <h1 class="text-4xl md:text-5xl font-serif font-semibold tracking-wide text-pink-500 mb-8 text-center">
            Yeeeeeey! Lovee youuu! 🥰
        </h1>

        <div class="scene">
            <div class="a3d" style="--n: 5">
                <img class="card" style="--i: 0" src="your-photo-1.jpg">
                <img class="card" style="--i: 1" src="your-photo-2.jpg">
                <img class="card" style="--i: 2" src="your-photo-3.jpg">
                <img class="card" style="--i: 3" src="your-photo-4.jpg">
                <img class="card" style="--i: 4" src="your-photo-5.jpg">
            </div>
        </div>

    </div>

</body>


</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🥰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Floating animation for the title */
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 3D Carousel Animation */
        @keyframes spin-y {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .animate-spin-3d {
            animation: spin-y 20s linear infinite;
        }

        /* Responsive 3D depth */
        .perspective-container {
            perspective: 1000px;
        }
    </style>
</head>
<body>

    <div class="text-center">
        <h1 class="text-4xl font-bold text-red-600 mb-4">Yay! See you on the 14th! 🥰</h1>
        
        <div class="scene">
            <div class="a3d" style="--n: 6">
                <img class="card" style="--i: 0" src="your-photo-1.jpg">
                <img class="card" style="--i: 1" src="your-photo-2 copy 2.jpg">
                <img class="card" style="--i: 2" src="your-photo-2 copy 3.jpg">
                <img class="card" style="--i: 3" src="your-photo-2 copy 4.jpg">
                <img class="card" style="--i: 4" src="your-photo-2 copy 5.jpg">
                <img class="card" style="--i: 5" src="your-photo-2.jpg">
            </div>
        </div>
        
        <a href="index.html" class="mt-8 inline-block text-red-400 hover:text-red-600 underline">Back to start</a>
    </div>

</body>
</html>
